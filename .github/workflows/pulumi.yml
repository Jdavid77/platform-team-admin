name: Pulumi Infrastructure

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  pulumi-preview:
    runs-on: ubuntu-latest
    environment: platform-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - run: uv sync
        working-directory: platform-team-administration

      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: Jdavid77/platformteamadministration/dev
          color: always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  approve-deployment:
    needs: pulumi-preview
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pulumi
    steps:
      - run: echo "Deployment approved"

  pulumi-up:
    needs: approve-deployment
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pulumi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - run: uv sync
        working-directory: platform-team-administration

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: Jdavid77/platformteamadministration/dev
          color: always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
